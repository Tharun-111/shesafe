services:
  - type: web
    name: shesafe-server
    runtime: node
    region: oregon
    plan: free
    startCommand: cd server && npm install && npm start
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        value: https://shesafe.vercel.app
